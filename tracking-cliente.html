<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Prime Logistic Spa — Estado de tu pedido</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --dk:#080c16;--card:#10151f;--card2:#161d2b;--bdr:rgba(255,255,255,0.07);
  --accent:#00d9ad;--accent-dim:rgba(0,217,173,.12);
  --warn:#f5a623;--danger:#ff4d6d;--success:#15d480;
  --blue:#5b9bff;--purple:#b18aff;--text:#f4f7fb;--muted:#7c8aa3;--muted2:#4a5670;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{background:var(--dk)}
body{min-height:100vh;background:radial-gradient(circle at 50% -10%, rgba(0,217,173,.08), transparent 45%),var(--dk);color:var(--text);font-family:var(--font);overflow-x:hidden}
.app{width:100%;max-width:480px;margin:0 auto;padding:0 0 32px;min-height:100vh}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(0,217,173,.5)}70%{box-shadow:0 0 0 10px rgba(0,217,173,0)}100%{box-shadow:0 0 0 0 rgba(0,217,173,0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* HEADER */
.header{padding:28px 22px 20px;text-align:center;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--bdr),transparent)}
.brand{display:inline-flex;align-items:center;gap:7px;background:var(--accent-dim);border:1px solid rgba(0,217,173,.25);border-radius:20px;padding:5px 14px;margin-bottom:14px}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse-ring 2s infinite}
.brand-text{font-size:10px;font-weight:700;letter-spacing:1.8px;color:var(--accent);text-transform:uppercase}
.title{font-size:24px;font-weight:800;letter-spacing:-.3px;margin-bottom:6px;background:linear-gradient(135deg,#fff,#c4ccdb);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:12.5px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto}

/* BUSCADOR */
.search-wrap{padding:0 18px;margin-bottom:18px;animation:fadeUp .5s ease}
.search-box{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--bdr);border-radius:20px;padding:22px;box-shadow:0 20px 40px -20px rgba(0,0,0,.5)}
.search-label{font-size:11px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:.3px}
.search-input-wrap{display:flex;gap:8px}
.search-inp{flex:1;background:rgba(255,255,255,.04);border:1.5px solid var(--bdr);border-radius:13px;padding:14px 16px;font-size:15px;color:var(--text);font-family:var(--font);outline:none;transition:all .25s;font-weight:500}
.search-inp:focus{border-color:var(--accent);background:rgba(0,217,173,.05);box-shadow:0 0 0 4px rgba(0,217,173,.08)}
.search-inp::placeholder{color:var(--muted2);font-size:13px;font-weight:400}
.btn-buscar{padding:14px 22px;border-radius:13px;background:linear-gradient(135deg,var(--accent),#00b894);color:#04130f;font-size:14px;font-weight:800;border:none;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap;box-shadow:0 8px 20px -6px rgba(0,217,173,.45)}
.btn-buscar:active{transform:scale(.95);box-shadow:0 4px 10px -4px rgba(0,217,173,.4)}

/* RESULTADO */
.result-wrap{padding:0 18px}
.not-found{background:var(--card);border:1px solid rgba(255,77,109,.25);border-radius:20px;padding:32px 24px;text-align:center;animation:fadeUp .4s ease}
.not-found-icon{font-size:44px;margin-bottom:14px;opacity:.9}
.not-found-title{font-size:16px;font-weight:700;color:var(--danger);margin-bottom:8px}
.not-found-sub{font-size:12.5px;color:var(--muted);line-height:1.7}

/* SKELETON LOADING */
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(255,255,255,.07) 37%,rgba(255,255,255,.03) 63%);background-size:400% 100%;animation:shimmer 1.4s infinite linear;border-radius:8px}

/* PEDIDO CARD */
.pedido-card{background:linear-gradient(160deg,var(--card),var(--card2));border:1px solid var(--bdr);border-radius:22px;overflow:hidden;margin-bottom:14px;box-shadow:0 24px 48px -24px rgba(0,0,0,.6);animation:fadeUp .45s ease}
.pedido-header{padding:18px 20px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.015)}
.pedido-doc-wrap{display:flex;flex-direction:column;gap:2px}
.pedido-doc-label{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.pedido-doc{font-size:15px;font-weight:700;font-family:var(--mono);color:var(--text)}
.status-badge{font-size:10px;font-weight:800;padding:6px 14px;border-radius:24px;letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px}
.status-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-ruta{background:rgba(0,217,173,.15);color:var(--accent)}
.badge-transito{background:rgba(91,155,255,.15);color:var(--blue)}
.badge-entregado{background:rgba(21,212,128,.15);color:var(--success)}
.badge-pendiente{background:rgba(245,166,35,.15);color:var(--warn)}
.badge-incidencia{background:rgba(255,77,109,.15);color:var(--danger)}
.badge-retirado{background:rgba(177,138,255,.15);color:var(--purple)}

/* ESTADO VISUAL */
.estado-visual{padding:32px 20px 28px;border-bottom:1px solid var(--bdr);text-align:center;position:relative;overflow:hidden}
.estado-glow{position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;filter:blur(40px);opacity:.25;pointer-events:none}
.estado-icon-wrap{width:88px;height:88px;border-radius:26px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;position:relative;z-index:1}
.estado-icon-big{font-size:42px}
.estado-nombre{font-size:21px;font-weight:800;margin-bottom:6px;letter-spacing:-.2px}
.estado-desc{font-size:12.5px;color:var(--muted);line-height:1.6;max-width:280px;margin:0 auto}

/* PROGRESO */
.progreso{padding:22px 20px;border-bottom:1px solid var(--bdr)}
.prog-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:6px}
.prog-steps{display:flex;align-items:flex-start;justify-content:space-between;position:relative}
.prog-step{display:flex;flex-direction:column;align-items:center;gap:8px;flex:1;position:relative;z-index:1}
.prog-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid var(--bdr);background:var(--card);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.prog-dot.done{background:linear-gradient(135deg,var(--success),#0fb86a);border-color:transparent;box-shadow:0 4px 12px -4px rgba(21,212,128,.5)}
.prog-dot.active{background:linear-gradient(135deg,var(--accent),#00b894);border-color:transparent;box-shadow:0 0 0 5px rgba(0,217,173,.18);transform:scale(1.12)}
.prog-dot.pending{background:rgba(255,255,255,.02);border-color:var(--bdr);opacity:.5}
.prog-label{font-size:9px;color:var(--muted2);font-weight:700;letter-spacing:.2px;text-transform:uppercase;text-align:center}
.prog-label.active{color:var(--accent)}
.prog-label.done{color:var(--success)}
.prog-line{position:absolute;top:16px;left:16px;right:16px;height:2px;background:var(--bdr);z-index:0;border-radius:2px;overflow:hidden}
.prog-line-fill{height:100%;background:linear-gradient(90deg,var(--success),var(--accent));transition:width .8s cubic-bezier(.4,0,.2,1);border-radius:2px}

/* DETALLES */
.detalles{padding:18px 20px}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--bdr);font-size:13px;gap:12px}
.det-row:last-child{border-bottom:none}
.det-label{color:var(--muted);font-weight:500;display:flex;align-items:center;gap:6px;white-space:nowrap;font-size:12px}
.det-val{font-weight:600;text-align:right;color:var(--text)}
.det-eta{color:var(--accent);font-weight:800;font-family:var(--mono);font-size:14px}

/* ALERTA */
.alerta-box{margin:0 20px 16px;background:linear-gradient(135deg,rgba(255,77,109,.1),rgba(255,77,109,.04));border:1px solid rgba(255,77,109,.25);border-radius:14px;padding:14px 16px;display:flex;align-items:flex-start;gap:12px}
.alerta-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.alerta-txt{font-size:12.5px;color:#ffb8c4;font-weight:600;line-height:1.5}

/* MAPA */
.mapa-wrap{margin:0 18px 14px;border-radius:20px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 16px 32px -20px rgba(0,0,0,.5);animation:fadeUp .5s ease .1s backwards}
.mapa-header{padding:13px 18px;background:linear-gradient(135deg,rgba(0,217,173,.08),rgba(0,217,173,.02));border-bottom:1px solid var(--bdr);font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
#mapa-cliente{height:240px;width:100%;filter:saturate(.85)}
.mapa-addr{padding:11px 18px;font-size:12px;color:var(--muted);border-top:1px solid var(--bdr);line-height:1.5;display:flex;align-items:center;gap:7px}

/* ACCIONES */
.acciones-wrap{padding:0 20px 20px;display:flex;gap:10px}
.btn-accion{flex:1;padding:13px;border-radius:13px;font-size:12.5px;font-weight:700;border:1.5px solid var(--bdr);background:rgba(255,255,255,.03);color:var(--text);cursor:pointer;font-family:var(--font);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-accion:active{transform:scale(.96)}
.btn-accion.primary{background:linear-gradient(135deg,#25d366,#1da851);border-color:transparent;color:#fff}

/* FOOTER */
.footer{text-align:center;padding:28px 20px 10px;font-size:11px;color:var(--muted2);line-height:1.9}
.footer-brand{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;opacity:.7}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--card2);border:1px solid var(--accent);border-radius:13px;padding:12px 22px;font-size:12.5px;color:var(--accent);font-weight:700;transition:transform .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 12px 24px -8px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{background:#1a2230!important;color:#fff!important;border-radius:12px!important}
.leaflet-popup-tip{background:#1a2230!important}
.leaflet-control-zoom a{background:#1a2230!important;color:#fff!important;border-color:rgba(255,255,255,.1)!important}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand"><span class="brand-dot"></span><span class="brand-text">Prime Logistic Spa</span></div>
    <div class="title">Estado de tu pedido</div>
    <div class="subtitle">Ingresa tu número de factura o guía de despacho para ver el seguimiento en tiempo real</div>
  </div>

  <div class="search-wrap">
    <div class="search-box">
      <label class="search-label">📄 Número de Factura o GD</label>
      <div class="search-input-wrap">
        <input class="search-inp" id="inp-doc" placeholder="Ej: GD-0421 o 8636454" onkeydown="if(event.key==='Enter')buscarPedido()" autocomplete="off" inputmode="text"/>
        <button class="btn-buscar" onclick="buscarPedido()">Buscar</button>
      </div>
    </div>
  </div>

  <div class="result-wrap" id="result-wrap"></div>

  <div class="footer">
    <div class="footer-brand">Prime Logistic Spa</div>
    <div>Seguimiento de entregas en tiempo real</div>
    <div style="margin-top:3px">Para consultas, contacta a tu ejecutivo de cuenta</div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const BL={ruta:'En Ruta',transito:'En Tránsito',entregado:'Entregado',pendiente:'Pendiente',incidencia:'Incidencia',retirado:'Retirado'};
const BC={ruta:'badge-ruta',transito:'badge-transito',entregado:'badge-entregado',pendiente:'badge-pendiente',incidencia:'badge-incidencia',retirado:'badge-retirado'};
const BI={ruta:'🔄',transito:'🚚',entregado:'✅',pendiente:'⏳',incidencia:'⚠️',retirado:'📦'};
const BD={
  ruta:'Tu pedido está en camino hacia tu dirección.',
  transito:'Tu pedido está en tránsito hacia la zona de entrega.',
  entregado:'Tu pedido fue entregado exitosamente.',
  pendiente:'Tu pedido está pendiente de despacho.',
  incidencia:'Hubo un inconveniente con tu entrega. Te contactaremos a la brevedad.',
  retirado:'Tu pedido fue retirado desde bodega y pronto saldrá a ruta.'
};
const BC2={ruta:'var(--accent)',transito:'var(--blue)',entregado:'var(--success)',pendiente:'var(--warn)',incidencia:'var(--danger)',retirado:'var(--purple)'};
const BGLOW={ruta:'#00d9ad',transito:'#5b9bff',entregado:'#15d480',pendiente:'#f5a623',incidencia:'#ff4d6d',retirado:'#b18aff'};
const BBG={ruta:'rgba(0,217,173,.12)',transito:'rgba(91,155,255,.12)',entregado:'rgba(21,212,128,.12)',pendiente:'rgba(245,166,35,.12)',incidencia:'rgba(255,77,109,.12)',retirado:'rgba(177,138,255,.12)'};

const PASOS=[
  {key:'retirado',label:'Retirado',icon:'📦'},
  {key:'transito',label:'Tránsito',icon:'🚚'},
  {key:'ruta',label:'En Ruta',icon:'🔄'},
  {key:'entregado',label:'Entregado',icon:'✅'},
];
const ORDEN={retirado:0,transito:1,ruta:2,entregado:3,pendiente:1,incidencia:2};

function getPedidosURL(){
  const p=new URLSearchParams(window.location.search);
  const raw=p.get('data');
  if(!raw) return [];
  try{ return JSON.parse(decodeURIComponent(escape(atob(raw)))); }catch(e){return [];}
}

function buscarPedido(){
  const doc=document.getElementById('inp-doc').value.trim().toUpperCase();
  if(!doc){showToast('⚠️ Ingresa un número de documento');return;}

  // Mostrar skeleton mientras "busca"
  const wrap=document.getElementById('result-wrap');
  wrap.innerHTML=`
    <div class="pedido-card">
      <div style="padding:20px">
        <div class="skeleton" style="height:18px;width:60%;margin-bottom:12px"></div>
        <div class="skeleton" style="height:60px;width:60px;border-radius:18px;margin:20px auto"></div>
        <div class="skeleton" style="height:14px;width:40%;margin:0 auto 8px"></div>
        <div class="skeleton" style="height:12px;width:70%;margin:0 auto"></div>
      </div>
    </div>`;

  setTimeout(()=>{
    const pedidos=getPedidosURL();
    const found=pedidos.find(o=>
      (o.doc||'').toString().toUpperCase()===doc ||
      (o.id||'').toString().toUpperCase()===doc ||
      (o.doc||'').toString().toUpperCase().includes(doc) ||
      doc.includes((o.doc||'').toString().toUpperCase())
    );
    mostrarResultado(found, doc);
  }, 400);
}

function mostrarResultado(o, doc){
  const wrap=document.getElementById('result-wrap');
  if(!o){
    wrap.innerHTML=`
      <div class="not-found">
        <div class="not-found-icon">🔍</div>
        <div class="not-found-title">Pedido no encontrado</div>
        <div class="not-found-sub">No encontramos ningún pedido con el número <strong style="color:var(--text)">${doc}</strong>.<br>Verifica el número e intenta nuevamente.</div>
      </div>`;
    return;
  }
  const paso=ORDEN[o.status]??1;
  const pct=Math.round((paso/3)*100);
  const stepsHTML=PASOS.map((p,i)=>{
    const cls=i<paso?'done':i===paso?'active':'pending';
    const lblCls=i<paso?'done':i===paso?'active':'';
    return `<div class="prog-step">
      <div class="prog-dot ${cls}">${i<=paso?p.icon:''}</div>
      <div class="prog-label ${lblCls}">${p.label}</div>
    </div>`;
  }).join('');

  const tel = o.telefono ? o.telefono.replace(/[^0-9+]/g,'') : '';
  const mapsQuery = encodeURIComponent((o.addr||'')+', '+(o.city||'')+', Chile');

  wrap.innerHTML=`
    <div class="pedido-card">
      <div class="pedido-header">
        <div class="pedido-doc-wrap">
          <span class="pedido-doc-label">Documento</span>
          <span class="pedido-doc">${o.doc||o.id}</span>
        </div>
        <span class="status-badge ${BC[o.status]}">${BL[o.status]}</span>
      </div>
      <div class="estado-visual">
        <div class="estado-glow" style="background:${BGLOW[o.status]}"></div>
        <div class="estado-icon-wrap" style="background:${BBG[o.status]}">
          <span class="estado-icon-big">${BI[o.status]}</span>
        </div>
        <div class="estado-nombre" style="color:${BC2[o.status]}">${BL[o.status]}</div>
        <div class="estado-desc">${BD[o.status]}</div>
      </div>
      ${o.status!=='incidencia'&&o.status!=='pendiente'?`
      <div class="progreso">
        <div class="prog-title">📍 Progreso del envío</div>
        <div class="prog-steps">
          <div class="prog-line"><div class="prog-line-fill" style="width:${pct}%"></div></div>
          ${stepsHTML}
        </div>
      </div>`:''}
      ${o.alert?`<div class="alerta-box"><span class="alerta-icon">⚠️</span><div class="alerta-txt">Hay un inconveniente con tu pedido. Nuestro equipo está trabajando para resolverlo.</div></div>`:''}
      <div class="detalles">
        <div class="det-row"><span class="det-label">👤 Cliente</span><span class="det-val">${o.client||'—'}</span></div>
        <div class="det-row"><span class="det-label">📍 Dirección</span><span class="det-val">${o.addr||'—'}</span></div>
        <div class="det-row"><span class="det-label">🏙 Ciudad</span><span class="det-val">${o.city||'—'}</span></div>
        <div class="det-row"><span class="det-label">🚗 Conductor</span><span class="det-val">${o.driver||'—'}</span></div>
        <div class="det-row"><span class="det-label">🔑 Patente</span><span class="det-val" style="font-family:var(--mono)">${o.plate||'—'}</span></div>
        <div class="det-row"><span class="det-label">🕐 ETA</span><span class="det-val det-eta">${o.eta||'—'}</span></div>
      </div>
    </div>
    <div class="mapa-wrap">
      <div class="mapa-header">🗺️ Ubicación de entrega</div>
      <div id="mapa-cliente"></div>
      <div class="mapa-addr">📍 ${o.addr||''}, ${o.city||''}</div>
    </div>
    <div class="acciones-wrap">
      <button class="btn-accion" onclick="window.open('https://maps.google.com/?q=${mapsQuery}','_blank')">🗺️ Ver en Google Maps</button>
      ${tel?`<button class="btn-accion primary" onclick="window.open('https://wa.me/${tel}','_blank')">📲 WhatsApp</button>`:''}
    </div>`;
  iniciarMapa(o.addr||'', o.city||'');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

let _mapa=null;

function iniciarMapa(direccion, ciudad){
  setTimeout(()=>{
    const contenedor=document.getElementById('mapa-cliente');
    if(!contenedor) return;
    if(_mapa){_mapa.remove();_mapa=null;}
    const coordsDefecto=obtenerCoordsCiudad(ciudad);
    _mapa=L.map('mapa-cliente',{zoomControl:true,scrollWheelZoom:false}).setView(coordsDefecto,14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap',maxZoom:19
    }).addTo(_mapa);
    const icono=L.divIcon({
      html:`<div style="background:#00d9ad;width:30px;height:30px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.4)"></div>`,
      iconSize:[30,30],iconAnchor:[15,30],popupAnchor:[0,-30],className:''
    });
    const query=encodeURIComponent(direccion+', '+ciudad+', Chile');
    fetch('https://nominatim.openstreetmap.org/search?format=json&q='+query+'&limit=1&countrycodes=cl')
      .then(r=>r.json())
      .then(data=>{
        if(data&&data.length>0){
          const lat=parseFloat(data[0].lat);
          const lon=parseFloat(data[0].lon);
          _mapa.setView([lat,lon],16);
          L.marker([lat,lon],{icon:icono})
            .addTo(_mapa)
            .bindPopup(`<b style="font-family:Outfit,sans-serif">${direccion}</b><br><span style="font-size:11px;opacity:.7">${ciudad}</span>`)
            .openPopup();
        } else {
          L.marker(coordsDefecto,{icon:icono})
            .addTo(_mapa)
            .bindPopup(`<b style="font-family:Outfit,sans-serif">${ciudad}</b>`)
            .openPopup();
        }
      })
      .catch(()=>{
        L.marker(coordsDefecto,{icon:icono}).addTo(_mapa);
      });
  }, 300);
}

function obtenerCoordsCiudad(ciudad){
  const coords={
    'santiago':[-33.4489,-70.6693],'providencia':[-33.4327,-70.6082],
    'ñuñoa':[-33.4569,-70.5987],'las condes':[-33.4109,-70.5745],
    'temuco':[-38.7359,-72.5904],'concepción':[-36.8201,-73.0444],
    'los angeles':[-37.4720,-72.3530],'valdivia':[-39.8142,-73.2459],
    'osorno':[-40.5739,-73.1352],'puerto montt':[-41.4693,-72.9424],
    'futrono':[-40.1236,-72.3894],'la union':[-40.2947,-72.9997],
    'lago ranco':[-40.2089,-72.5246],'puerto varas':[-41.3186,-72.9821],
    'chillan':[-36.6065,-72.1033],'rancagua':[-34.1708,-70.7444],
    'talca':[-35.4264,-71.6554],'linares':[-35.8453,-71.5958],
    'los rios':[-39.8142,-73.2459],'los lagos':[-40.3,-72.8],
    'araucanía':[-38.7,-72.5],'biobío':[-37.0,-72.0],
  };
  const key=(ciudad||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  for(const k of Object.keys(coords)){
    if(key.includes(k)||k.includes(key)) return coords[k];
  }
  return [-40.0,-72.5];
}
